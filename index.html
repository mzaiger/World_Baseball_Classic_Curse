<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=0.6">
    <title>Fantasy Baseball Auto Pilot</title>
    <style>
        :root {
            --bg: #f4f7f6;
            --card-bg: #ffffff;
            --primary: #007bff;
            --secondary: #6c757d;
            --accent: #28a745;
            --text: #333;
            --border: #dee2e6;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 3px solid var(--primary);
            padding-bottom: 10px;
        }

        h1 { margin: 0; color: var(--primary); }
        h2 { border-bottom: 2px solid var(--border); padding-bottom: 5px; margin-top: 40px; }

        .grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }

        @media (min-width: 900px) {
            .grid { grid-template-columns: 2fr 1fr; }
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: var(--card-bg);
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }

        th { background-color: #f8f9fa; font-weight: 600; }
        
        .status-badge {
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.85em;
            font-weight: bold;
        }
        .status-Healthy { background: #d4edda; color: #155724; }
        .status-IL { background: #f8d7da; color: #721c24; }

        .game-card {
            background: var(--card-bg);
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 8px;
            border-left: 5px solid var(--primary);
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .refresh-tag {
            font-size: 0.8em;
            color: var(--secondary);
            text-align: center;
            margin-top: 5px;
        }

        .log-container {
            margin-top: 40px;
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .log-entry {
            padding: 8px 0;
            border-bottom: 1px solid var(--border);
            font-family: monospace;
        }
        .log-entry:last-child { border-bottom: none; }
        .pos-label { font-weight: bold; color: var(--primary); width: 50px; display: inline-block; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Fantasy Baseball Auto Pilot</h1>
        <div id="roster-date" style="margin-top: 5px; color: var(--text);"></div>
        <div id="last-updated" class="refresh-tag"></div>
    </header>

    <div class="grid">
        <section>
            <h2>Active Lineup</h2>
            <table id="active-roster">
                <thead>
                    <tr>
                        <th>Pos</th>
                        <th>Player</th>
                        <th>Team</th>
                        <th>Rank (Pre/Cur)</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>

            <h2>Bench & Inactive</h2>
            <table id="bench-roster">
                <thead>
                    <tr>
                        <th>Pos</th>
                        <th>Player</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </section>

        <section>
            <h2>Today's MLB Games</h2>
            <div id="game-list"></div>
        </section>
    </div>

    <section class="log-container">
        <h2>Position Change Log</h2>
        <div id="change-log">
            <p style="color: var(--secondary);">No changes detected in current update.</p>
        </div>
    </section>
</div>

<script>
    async function loadDashboard() {
        const cacheBuster = `?t=${new Date().getTime()}`;
        const lastUpdatedEl = document.getElementById('last-updated');
        const rosterDateEl = document.getElementById('roster-date');
        
        lastUpdatedEl.innerHTML = `<strong>Refreshing data: ${new Date().toLocaleTimeString()}</strong>`;

        try {
            const [rosterRes, gamesRes, updateRes] = await Promise.all([
                fetch(`current_roster.json${cacheBuster}`).then(r => r.json()),
                fetch(`mlb_games.json${cacheBuster}`).then(r => r.json()),
                fetch(`roster_update.xml${cacheBuster}`).then(r => r.text())
            ]);

            const parser = new DOMParser();
            const xmlDoc = parser.parseFromString(updateRes, "text/xml");
            
            const xmlDate = xmlDoc.getElementsByTagName("date")[0]?.textContent;
            if (xmlDate) {
                rosterDateEl.innerHTML = `<strong>Roster Date: ${xmlDate}</strong>`;
            }

            const playerUpdates = {};
            const playerNodes = xmlDoc.getElementsByTagName("player");
            
            for (let node of playerNodes) {
                const key = node.getElementsByTagName("player_key")[0].textContent;
                const pos = node.getElementsByTagName("position")[0].textContent;
                playerUpdates[key] = pos;
            }

            renderRoster(rosterRes, playerUpdates);
            renderGames(gamesRes);
            renderChangeLog(rosterRes, playerUpdates);

        } catch (error) {
            console.error("Error loading fantasy data:", error);
        }
    }

    function renderRoster(roster, updates) {
        const activeTable = document.querySelector("#active-roster tbody");
        const benchTable = document.querySelector("#bench-roster tbody");
        activeTable.innerHTML = "";
        benchTable.innerHTML = "";

        roster.forEach(player => {
            const currentPos = updates[player.player_key] || player.selected_position;
            const isBench = ["BN", "IL", "NA"].includes(currentPos);

            const row = `
                <tr>
                    <td><strong>${currentPos}</strong></td>
                    <td>${player.name}</td>
                    ${!isBench ? `<td>${player.team}</td>` : ''}
                    ${!isBench ? `<td>${player.preseason_rank} / ${player.current_rank}</td>` : ''}
                    <td><span class="status-badge status-${player.status.substring(0,2)}">${player.status}</span></td>
                </tr>
            `;

            if (isBench) {
                benchTable.innerHTML += row;
            } else {
                activeTable.innerHTML += row;
            }
        });
    }

    function renderGames(data) {
        const gameList = document.getElementById("game-list");
        gameList.innerHTML = "";

        if (!data.mlb_games || data.mlb_games.length === 0) {
            gameList.innerHTML = "<p>No games scheduled for today.</p>";
            return;
        }

        data.mlb_games.forEach(game => {
            const startTime = new Date(game.start_time_utc).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            gameList.innerHTML += `
                <div class="game-card">
                    <strong>${game.away_team.name}</strong> @ <strong>${game.home_team.name}</strong><br>
                    <small>${startTime} - ${game.venue}</small>
                </div>
            `;
        });
    }

    function renderChangeLog(roster, updates) {
        const logContainer = document.getElementById("change-log");
        let changesHtml = "";

        // Iterate through each player in current_roster
        roster.forEach(player => {
            const oldPos = player.selected_position;
            const newPos = updates[player.player_key];

            // Only proceed if a position change occurred
            if (newPos && oldPos !== newPos) {
                if (newPos === "BN") {
                    // Specific requirement: BN spots only show the player name
                    changesHtml += `
                        <div class="log-entry">
                            <span class="pos-label">${newPos}:</span> ${player.name}
                        </div>
                    `;
                } else {
                    // Find who was previously at the new position slot for "->" mapping
                    const originalOccupant = roster.find(p => p.selected_position === newPos);
                    
                    if (originalOccupant && originalOccupant.player_key !== player.player_key) {
                        changesHtml += `
                            <div class="log-entry">
                                <span class="pos-label">${newPos}:</span> ${originalOccupant.name} &rarr; ${player.name}
                            </div>
                        `;
                    }
                }
            }
        });

        if (changesHtml !== "") {
            logContainer.innerHTML = changesHtml;
        } else {
            logContainer.innerHTML = `<p style="color: var(--secondary);">No position changes detected.</p>`;
        }
    }

    loadDashboard();
    setInterval(loadDashboard, 300000);
</script>

</body>
</html>
