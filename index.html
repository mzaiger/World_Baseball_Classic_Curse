<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World Baseball Classic Curse</title>
<style>
    body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        background-color: #121212; /* Dark background */
        color: #000000;
        padding: 20px;
    }
    h1 {
        text-align: center;
        color: #ffffff; /* Keeping title white for visibility */
    }
    table {
        width: 100%;
        max-width: 1000px;
        margin: 0 auto;
        border-collapse: collapse;
        background: #1e1e1e; /* Darker table body */
        box-shadow: 0 4px 8px rgba(0,0,0,0.5);
    }
    th {
        background-color: #333;
        color: #ffffff;
        font-weight: bold; /* Bolded letters */
        text-align: left;
        padding: 10px 12px;
        font-size: 0.9rem;
        border: 1px solid #ffffff; /* White border around each cell */
    }
    td {
        padding: 6px 12px;
        border: 1px solid #ffffff; /* White border around each cell */
        font-size: 0.85rem;
        color: #ffffff; /* Black text */
        font-weight: bold; /* Bolded letters */
    }
    /* Adjusted highlight colors so black text is legible */
    .worse {
        background-color: #ff6b6b !important; /* Brighter red for contrast */
    }
    .better {
        background-color: #51cf66 !important; /* Brighter green for contrast */
    }
    tr:hover {
        background-color: #2a2a2a;
    }
    /* Fallback for standard rows to ensure black text is visible on dark background */
    tr:not(.worse):not(.better) td {
        background-color: #cccccc; 
    }
</style>
</head>
<body>

    <h1>World Baseball Classic Curse</h1>

    <table>
        <thead>
            <tr>
                <th>Player</th>
                <th>MLB Team</th>
                <th>WBC Team</th>
                <th>Fantasy Team</th>
                <th>Current Rank</th>
                <th>Preseason Rank</th>
            </tr>
        </thead>
        <tbody id="tableBody">
            </tbody>
    </table>

    <script>
        async function loadPlayerData() {
            try {
                const response = await fetch('player_ranks.json');
                const data = await response.json();

                // Order by Preseason Rank (Smallest to Greatest)
                data.sort((a, b) => parseInt(a.preseason_rank) - parseInt(b.preseason_rank));

                const tableBody = document.getElementById('tableBody');
                tableBody.innerHTML = '';

                data.forEach(player => {
                    const tr = document.createElement('tr');
                    const pre = parseInt(player.preseason_rank);
                    const cur = parseInt(player.current_rank);

                    // Red-Green structure: Green if rank improved (pre > cur), Red if dropped (cur > pre)
                    if (cur > pre) {
                        tr.classList.add('worse');
                    } else if (pre > cur) {
                        tr.classList.add('better');
                    }

                    // Added MLB Team (ORG) and WBC Team (WBC TEAM)
                    tr.innerHTML = `
                        <td>${player.name_raw}</td>
                        <td>${player.ORG}</td>
                        <td>${player["WBC TEAM"]}</td>
                        <td>${player.fantasy_team}</td>
                        <td>${player.current_rank}</td>
                        <td>${player.preseason_rank}</td>
                    `;
                    tableBody.appendChild(tr);
                });
            } catch (error) {
                console.error("Unable to load JSON:", error);
            }
        }

        loadPlayerData();
    </script>
</body>
</html>
