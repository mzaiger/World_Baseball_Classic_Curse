<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World Baseball Classic Curse</title>
<style>
    body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        background-color: #121212;
        color: #ffffff;
        padding: 10px;
    }
    h1 {
        text-align: center;
        color: #ffffff;
        font-size: 1.5rem;
    }
    table {
        width: 100%;
        max-width: 600px; /* Narrower for mobile */
        margin: 0 auto;
        border-collapse: collapse;
        background: #1e1e1e;
        box-shadow: 0 4px 8px rgba(0,0,0,0.5);
        table-layout: fixed; /* Ensures even spacing */
    }
    th {
        background-color: #333;
        color: #ffffff;
        font-weight: bold;
        text-align: center;
        padding: 10px 5px;
        font-size: 0.8rem;
        border: 1px solid #ffffff;
    }
    td {
        padding: 8px;
        border: 1px solid #ffffff;
        font-size: 0.85rem;
        color: #ffffff; /* White letters */
        font-weight: bold;
        word-wrap: break-word;
    }
    /* Sub-row styling for labels or secondary data */
    .sub-info {
        font-size: 0.75rem;
        text-align: center;
    }
    .worse td {
        background-color: #ff6b6b !important;
    }
    .better td {
        background-color: #51cf66 !important;
    }
    /* Fallback for standard rows */
    tr:not(.worse):not(.better) td {
        background-color: #444444; 
    }
</style>
</head>
<body>

    <h1>World Baseball Classic Curse</h1>

    <table>
        <thead>
            <tr>
                <th style="width: 50%;">Player</th>
                <th style="width: 25%;">Current</th>
                <th style="width: 25%;">Preseason</th>
            </tr>
        </thead>
        <tbody id="tableBody">
            </tbody>
    </table>

    <script>
        async function loadPlayerData() {
            try {
                const response = await fetch('player_ranks.json');
                const data = await response.json();

                // Order by Preseason Rank (Smallest to Greatest)
                data.sort((a, b) => parseInt(a.preseason_rank) - parseInt(b.preseason_rank));

                const tableBody = document.getElementById('tableBody');
                tableBody.innerHTML = '';

                data.forEach(player => {
                    const pre = parseInt(player.preseason_rank);
                    const cur = parseInt(player.current_rank);
                    let statusClass = '';

                    if (cur > pre) {
                        statusClass = 'worse';
                    } else if (pre > cur) {
                        statusClass = 'better';
                    }

                    // Top Row: Player, Current, Preseason
                    const topRow = document.createElement('tr');
                    topRow.className = statusClass;
                    topRow.innerHTML = `
                        <td>${player.name_raw}</td>
                        <td style="text-align:center;">${player.current_rank}</td>
                        <td style="text-align:center;">${player.preseason_rank}</td>
                    `;

                    // Bottom Row: WBC Team, MLB Team, Fantasy Team (Spans all columns)
                    const bottomRow = document.createElement('tr');
                    bottomRow.className = `${statusClass} sub-info`;
                    bottomRow.innerHTML = `
                        <td colspan="3">
                            WBC: ${player["WBC TEAM"]} | 
                            MLB: ${player.ORG} | 
                            FT: ${player.fantasy_team}
                        </td>
                    `;

                    tableBody.appendChild(topRow);
                    tableBody.appendChild(bottomRow);
                });
            } catch (error) {
                console.error("Unable to load JSON:", error);
            }
        }

        loadPlayerData();
    </script>
</body>
</html>
