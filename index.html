<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World Baseball Classic Curse</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f9f9f9;
            padding: 20px;
        }
        h1 {
            text-align: center;
            color: #222;
        }
        table {
            width: 100%;
            max-width: 900px;
            margin: 0 auto;
            border-collapse: collapse; /* Essential for thin, single lines between rows */
            background: white;
        }
        th {
            background-color: #333;
            color: white;
            text-align: left;
            padding: 8px 12px; /* Tighter padding */
            font-size: 0.9rem;
        }
        td {
            padding: 4px 12px; /* Significantly reduced vertical padding for closer rows */
            border-bottom: 1px solid #ddd; /* The line between each person */
            font-size: 0.85rem;
        }
        /* Specific coloring for rank movement */
        .worse { background-color: #ffebeb !important; }
        .better { background-color: #ebffeb !important; }
        
        tr:last-child td {
            border-bottom: none; /* Removes the line from the very last row */
        }
        tr:hover {
            background-color: #f0f0f0;
        }
    </style>
</head>
<body>

    <h1>World Baseball Classic Curse</h1>

    <table id="playerTable">
        <thead>
            <tr>
                <th>Player Name</th>
                <th>Team</th>
                <th>Current Rank</th>
                <th>Preseason Rank</th>
            </tr>
        </thead>
        <tbody id="tableBody">
            </tbody>
    </table>

    <script>
        async function loadPlayerData() {
            try {
                const response = await fetch('player_ranks.json');
                const data = await response.json();

                // Sort by Preseason Rank (Smallest to Greatest)
                data.sort((a, b) => parseInt(a.preseason_rank) - parseInt(b.preseason_rank));

                const tableBody = document.getElementById('tableBody');
                tableBody.innerHTML = '';

                data.forEach(player => {
                    const tr = document.createElement('tr');
                    const pre = parseInt(player.preseason_rank);
                    const cur = parseInt(player.current_rank);

                    if (cur > pre) {
                        tr.classList.add('worse');
                    } else if (pre > cur) {
                        tr.classList.add('better');
                    }

                    tr.innerHTML = `
                        <td>${player.name_raw}</td>
                        <td>${player.fantasy_team}</td>
                        <td>${player.current_rank}</td>
                        <td>${player.preseason_rank}</td>
                    `;
                    tableBody.appendChild(tr);
                });
            } catch (error) {
                console.error("Unable to load JSON:", error);
            }
        }

        loadPlayerData();
    </script>
</body>
</html>
