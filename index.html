<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World Baseball Classic Curse</title>
<style>
    body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        background-color: #121212;
        color: #ffffff;
        padding: 10px;
    }
    h1 {
        text-align: center;
        color: #ffffff;
        font-size: 1.4rem;
    }
    table {
        width: 100%;
        max-width: 800px;
        margin: 0 auto;
        border-collapse: collapse;
        background: #1e1e1e;
        box-shadow: 0 4px 8px rgba(0,0,0,0.5);
    }
    th {
        background-color: #333;
        color: #ffffff;
        font-weight: bold;
        text-align: left;
        padding: 10px;
        font-size: 0.8rem;
        border: 1px solid #ffffff;
    }
    td {
        padding: 8px;
        border: 1px solid #ffffff;
        font-size: 0.9rem;
        color: #ffffff; /* White letters */
        font-weight: bold;
        vertical-align: top; /* Keeps name at the top of the cell */
    }
    /* Sub-text for the team info */
    .team-info {
        display: block;
        font-size: 0.7rem;
        font-weight: bold;
        margin-top: 4px;
        opacity: 0.9;
	color: #000000;
    }
    .worse {
        background-color: #ff6b6b !important;
    }
    .better {
        background-color: #51cf66 !important;
    }
    tr:not(.worse):not(.better) td {
        background-color: #444444; 
    }
</style>
</head>
<body>

    <h1>World Baseball Classic Curse</h1>

    <table>
        <thead>
            <tr>
                <th style="width: 60%;">Player</th>
                <th style="width: 20%;">Current</th>
                <th style="width: 20%;">Pre-Season</th>
            </tr>
        </thead>
        <tbody id="tableBody">
        </tbody>
    </table>

    <script>
        async function loadPlayerData() {
            try {
                const response = await fetch('player_ranks.json');
                const data = await response.json();

                data.sort((a, b) => parseInt(a.preseason_rank) - parseInt(b.preseason_rank));

                const tableBody = document.getElementById('tableBody');
                tableBody.innerHTML = '';

                data.forEach(player => {
                    const tr = document.createElement('tr');
                    const pre = parseInt(player.preseason_rank);
                    const cur = parseInt(player.current_rank);

                    if (cur > pre) {
                        tr.classList.add('worse');
                    } else if (pre > cur) {
                        tr.classList.add('better');
                    }

                    tr.innerHTML = `
                        <td>
                            ${player.name_raw}
                            <span class="team-info">
                                (${player["WBC TEAM"]}, ${player.ORG}, ${player.fantasy_team})
                            </span>
                        </td>
                        <td style="text-align:center;">${player.current_rank}</td>
                        <td style="text-align:center;">${player.preseason_rank}</td>
                    `;
                    tableBody.appendChild(tr);
                });
            } catch (error) {
                console.error("Unable to load JSON:", error);
            }
        }

        loadPlayerData();
    </script>
</body>
</html>
